name: spatial_pusht_flat

# obs = [occupancy.flatten() (128*128) || agent_pos (2)]
# mirrors pusht_lowdim's "obs_dim = n_kp*keypoint_dim + agent_pos_dim" pattern.
obs_dim: 16386          # 128*128 + 2
action_dim: 2
keypoint_dim: 16384     # the occupancy slice (kept for the workspace's eval template)
zarr_path: exps/exp_pusht_real/spatial_pusht/data/spatial_pusht.zarr

env_runner:
  _target_: exps.exp_pusht_real.spatial_pusht.data.noop_runner.RealPushTLowdimRunner

dataset:
  _target_: exps.exp_pusht_real.spatial_pusht.data.occupancy_dataset.SpatialPushTOccupancyFlatDataset
  zarr_path: ${task.zarr_path}
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1+${n_latency_steps}'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.05
  max_train_episodes: null
  occupancy_pool: 1
  stride: 1
