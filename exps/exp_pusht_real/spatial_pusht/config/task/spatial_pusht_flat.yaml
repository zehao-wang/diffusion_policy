name: spatial_pusht_flat

occupancy_flat_shape: &occupancy_flat_shape [16384]   # 128 * 128
agent_pos_shape: &agent_pos_shape [2]
action_shape: &action_shape [2]
zarr_path: exps/exp_pusht_real/spatial_pusht/data/spatial_pusht.zarr

shape_meta: &shape_meta
  obs:
    occupancy_flat:  # flattened 128*128 binary occupancy
      shape: *occupancy_flat_shape
      type: low_dim
    agent_pos:       # current pusher voxel coords (robot state)
      shape: *agent_pos_shape
      type: low_dim
  action:
    shape: *action_shape

env_runner:
  _target_: diffusion_policy.env_runner.real_pusht_image_runner.RealPushTImageRunner

dataset:
  _target_: exps.exp_pusht_real.spatial_pusht.data.occupancy_dataset.SpatialPushTOccupancyFlatDataset
  zarr_path: ${task.zarr_path}
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1+${n_latency_steps}'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.05
  max_train_episodes: null
